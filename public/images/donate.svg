<svg
    xmlns="http://www.w3.org/2000/svg"
    width="172"
    height="64"
    viewBox="0 0 172 64"
>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset in="SourceAlpha" dx="1" dy="1" result="offset"/>
      <feFlood flood-color="black" flood-opacity="0.35" result="flood"/>
      <feComposite in="flood" in2="offset" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="172" height="64" rx="12" fill="#ff6a00" />
  <text
        x="86"
        y="40"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="24"
        font-weight="800"
        fill="white"
        text-anchor="middle"
        filter="url(#shadow)"
    >🤍 Donate 🤍</text>
</svg>
